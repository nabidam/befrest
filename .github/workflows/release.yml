name: Release

on:
  push:
    tags: ["v*"]
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            label: Linux amd64
          - runner: macos-15
            label: macOS amd64
          - runner: macos-14
            label: macOS arm64
          - runner: windows-2022
            label: Windows amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Linux tray dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libayatana-appindicator3-dev libgtk-3-dev
      - run: npm --prefix web ci
      - name: Build native release binary
        run: make release
        shell: bash
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.label }}
          path: dist/release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Create checksums
        working-directory: release-assets
        run: sha256sum befrest-* > SHA256SUMS.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-assets/* --generate-notes --title "Befrest ${GITHUB_REF_NAME}"
